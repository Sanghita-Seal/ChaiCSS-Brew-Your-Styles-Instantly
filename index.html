<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChaiTailwind Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h2 class="main-heading">
    <img src="./src/chai.png" alt="ChaiTailwind Logo" />
     Chai-Tailwind — Crafting Styles the Smart Way
  </h2>

  <div class="container">

    <!-- Editor Panel -->
    <div class="editor-panel">
      <h3>HTML Editor</h3>
      <textarea id="editor">
<div class="chai-p-20 chai-bg-red chai-text-center chai-rounded-10">
    Hello ChaiTailwind 🚀
</div>
      </textarea>
    </div>

    <!-- Preview Panel -->
    <div class="preview-panel">
      <h3>Live Preview</h3>
      <iframe id="preview"></iframe>
    </div>

  </div>

  <script src="main.js"></script>
 </body>
</html>
